[pytest]
# Modo auto: qualquer `async def` de teste ou fixture roda no event loop sem
# precisar do marcador `@pytest.mark.asyncio` em cada um.
asyncio_mode = auto

# Cada fixture assíncrona ganha um event loop próprio por teste. É o default do
# pytest-asyncio, mas deixá-lo explícito evita o aviso de deprecação que ele
# emite quando a opção fica em branco.
asyncio_default_fixture_loop_scope = function
