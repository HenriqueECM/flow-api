[pytest]
# Modo auto: qualquer `async def` de teste ou fixture roda no event loop sem
# precisar do marcador `@pytest.mark.asyncio` em cada um.
asyncio_mode = auto

# Fixtures e testes compartilham um único event loop por sessão. É exigência do
# engine de escopo de sessão: com um loop por teste (o default), as conexões do
# pool nasceriam no loop de um teste e explodiriam ao serem reaproveitadas no
# seguinte ("attached to a different loop"). Manter fixture e teste no mesmo
# escopo é o que permite criar engine e schema uma única vez por execução.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
